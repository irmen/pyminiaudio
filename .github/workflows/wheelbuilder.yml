name: Release build and upload to PyPI

# Build on every published release
on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.14'

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
        # I can't get windows tests to work, but at least here's linux testing the built wheels
          CIBW_TEST_REQUIRES: pytest
          CIBW_ARCHS_MACOS: 'x86_64 arm64'
          CIBW_BUILD: 'cp310-* cp311-* cp312-* cp313-* cp314-*'
          CIBW_TEST_COMMAND_LINUX: "cd {project} && pytest -v tests/"
          # doesn't work?: CIBW_ENVIRONMENT_MACOS: 'CFLAGS="-DMA_NO_RUNTIME_LINKING  -framework AudioToolbox "'


      - uses: actions/upload-artifact@v5
        with:
          name: pypi_artifacts on ${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_ios_wheels:
    name: Build iOS wheels
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.14'

      - name: Build iOS wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: 'cp310-* cp311-* cp312-* cp313-* cp314-*'
          CIBW_SKIP: '*-manylinux* *-win32 *-macosx* x86_64-apple-ios*'
          CIBW_TARGET: 'ios'
          CIBW_IOS_PLATFORM: 'iOS'
          CIBW_IOS_DEPLOYMENT_TARGET: '13.0'

      - uses: actions/upload-artifact@v5
        with:
          name: pypi_artifacts_ios
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.14'

      - name: Build sdist
        run: python setup.py sdist

      - uses: actions/upload-artifact@v5
        with:
          name: pypi_artifacts_source
          path: dist/*.tar.gz

  upload_pypi:
    name: Upload to PyPi
    needs: [build_wheels, build_ios_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pypi_artifacts*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TEST_TOKEN }}
